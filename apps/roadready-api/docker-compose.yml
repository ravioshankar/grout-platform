# RoadReady API + PostgreSQL — run from this directory:
#   docker compose up --build
#
# API:  http://localhost:8888/docs
# DB:   localhost:5433 (optional host access; API uses internal hostname "postgres")
#
# Override secrets/ports:
#   SECRET_KEY=$(openssl rand -base64 32) ROADREADY_API_PORT=9000 docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roadready
      POSTGRES_PASSWORD: roadready
      POSTGRES_DB: roadready
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${ROADREADY_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadready -d roadready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${ROADREADY_API_PORT:-8888}:8888"
    environment:
      DATABASE_URL: postgresql+psycopg://roadready:roadready@postgres:5432/roadready
      # Stable default for local Docker; override in production:
      SECRET_KEY: ${SECRET_KEY:-roadready-docker-dev-secret-change-me-please-32chars-min}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
